services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jiwar
      POSTGRES_PASSWORD: jiwar_dev_pw
      POSTGRES_DB: jiwar
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jiwar -d jiwar"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://jiwar:jiwar_dev_pw@db:5432/jiwar?schema=public
      PORT: 8000
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CLIENT_BASE_URL: ${CLIENT_BASE_URL:-http://localhost:5180}
      ADMIN_BASE_URL: ${ADMIN_BASE_URL:-http://localhost:5180/admin.html}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
    ports:
      - "8000:8000"

volumes:
  db-data:
